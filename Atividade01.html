    <title>Atividade01</title>
    <link rel="stylesheet" href="Atividade01.html.css">

<body>
<form id="formulario">

    <label for="email">Email</label>

    <label for="senha">Senha</label>

    <label for="idade">Idade</label>
    <input id="idade" type="number" />

    <label for="DataNascimento">Data de Nascimento</label>
    <input id="DataNascimento" type="date" />

    <label>Generos</label>
    <label>Feminino<input id="fem" name="genero" type="radio"></label>
    <label>Masculino<input id="masc" name="genero" type="radio"></label>
    <label>Outros<input id="outros" name="genero" type="radio"></label>

    <label>Turnos Disponiveis:</label>

    <label>Matutino
    <input  type="checkbox" />
    </label>

    <label>Vespertino
        <input  type="checkbox" />
    </label>

    <label>Nortuno
        <input type="checkbox" />
    </label>

    <label for="color">Cor Destaque</label>
    <input id="color" type="color" />

    <button>Enviar</button>
    <script src="Atividade01.html.js"></script>
</form>
